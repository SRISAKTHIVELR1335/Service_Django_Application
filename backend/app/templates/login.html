{% extends "base.html" %}

{% block title %}Login - NIRIX Diagnostics{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow-lg" style="max-width: 420px; width: 100%;">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <div class="text-center mb-4">
            <img src="/static/Vehicle_Images/Nirix_Logo.png"
                alt="NIRIX Logo"
                style="width: 160px; margin-bottom: 10px;" />

            <h2 class="mt-3 fw-bold">NIRIX Diagnostics</h2>
            <p class="text-muted">Sign in with your 4-digit PIN</p>
        </div>

      </div>

      <form method="POST" action="{{ url_for('web.login') }}">
        <div class="mb-3">
          <label for="email" class="form-label">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input
              type="email"
              class="form-control"
              id="email"
              name="email"
              required
              autofocus
              placeholder="you@example.com"
            />
          </div>
        </div>

        <div class="mb-4">
          <label for="pin" class="form-label">PIN (4 digits)</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-keypad"></i></span>
            <input
              type="password"
              class="form-control"
              id="pin"
              name="pin"
              maxlength="4"
              pattern="\d{4}"
              inputmode="numeric"
              required
              placeholder="Enter your 4-digit PIN"
            />
          </div>
          <small class="text-muted">
            Use the 4-digit PIN you set during registration.
          </small>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
      </form>

      <hr class="my-4" />

      <p class="text-center text-muted mb-0">
        Don't have an account?
        <a href="{{ url_for('web.register') }}" class="text-primary fw-semibold">
          Register here
        </a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
